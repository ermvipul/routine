<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Daily Activity Tracker</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    margin:0;
    padding:0;
    text-align:center;
}

h1{
    margin-top:25px;
    color:#333;
}

p.subtitle{
    color:#666;
}

.container{
    background:white;
    max-width:420px;
    margin:30px auto;
    padding:25px;
    border-radius:12px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.1);
}

h3{
    margin-top:20px;
    color:#444;
}

label{
    display:block;
    margin:10px 0;
    text-align:left;
    font-size:16px;
}

input[type="checkbox"]{
    margin-right:8px;
}

input[type="date"]{
    padding:6px;
    font-size:16px;
}

button{
    margin-top:15px;
    padding:10px 18px;
    border:none;
    border-radius:6px;
    font-size:14px;
    cursor:pointer;
}

.save{
    background:#007bff;
    color:white;
}

.reset{
    background:#dc3545;
    color:white;
}

button:hover{
    opacity:0.9;
}

.progress{
    margin-top:15px;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>📅 Daily Activity Tracker</h1>
<p class="subtitle">Track your habits and stay consistent</p>

<div class="container">

<h3>Select Date</h3>

<input type="date" id="datePicker">

<h3>Activities</h3>

<label><input type="checkbox" class="task"> Running</label>
<label><input type="checkbox" class="task"> Gym Workout</label>
<label><input type="checkbox" class="task"> 8000 Steps</label>
<label><input type="checkbox" class="task"> Drink 3L Water</label>
<label><input type="checkbox" class="task"> Healthy Diet</label>
<label><input type="checkbox" class="task"> Meditation</label>
<label><input type="checkbox" class="task"> Sleep 7+ Hours</label>

<div class="progress" id="progress">
Completion: 0%
</div>

<button class="save" onclick="saveDay()">Save Day</button>
<button class="reset" onclick="resetDay()">Reset Day</button>

</div>

<script>

const datePicker = document.getElementById("datePicker");
const tasks = document.querySelectorAll(".task");
const progressText = document.getElementById("progress");

datePicker.valueAsDate = new Date();

function updateProgress(){

    let completed = 0;

    tasks.forEach(task=>{
        if(task.checked) completed++;
    });

    let percent = Math.round((completed / tasks.length) * 100);

    progressText.innerText = "Completion: " + percent + "%";
}

tasks.forEach(task=>{
    task.addEventListener("change", updateProgress);
});

function saveDay(){

    const date = datePicker.value;

    let data = [];

    tasks.forEach(task=>{
        data.push(task.checked);
    });

    localStorage.setItem("tracker-"+date, JSON.stringify(data));

    updateProgress();

    alert("Saved for " + date);
}

function loadDay(){

    const date = datePicker.value;

    const saved = JSON.parse(localStorage.getItem("tracker-"+date));

    tasks.forEach((task,index)=>{
        task.checked = saved ? saved[index] : false;
    });

    updateProgress();
}

function resetDay(){

    const date = datePicker.value;

    localStorage.removeItem("tracker-"+date);

    tasks.forEach(task=>{
        task.checked=false;
    });

    updateProgress();
}

datePicker.addEventListener("change", loadDay);

loadDay();

</script>

</body>

</html>
