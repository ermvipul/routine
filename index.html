<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Routine Tracker</title>

<style>

body{
font-family:system-ui;
background:#f6f8fa;
margin:0;
text-align:center;
transition:0.3s;
}

.dark{
background:#0d1117;
color:white;
}

h1{margin-top:20px;}

.container{
background:white;
max-width:560px;
margin:30px auto;
padding:25px;
border-radius:12px;
box-shadow:0 4px 16px rgba(0,0,0,0.08);
}

.dark .container{
background:#161b22;
}

label{
display:block;
margin:6px 0;
text-align:left;
}

button{
margin:5px;
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}

.nav{background:#6c757d;color:white;}
.save{background:#238636;color:white;}
.reset{background:#da3633;color:white;}

.score{
margin-top:6px;
font-weight:600;
}

.dashboard{
font-size:14px;
margin-top:10px;
}

/* HEATMAP */

.heatmap-wrapper{
display:flex;
justify-content:center;
margin-top:20px;
}

.heatmap{
display:grid;
grid-template-columns:repeat(53,12px);
grid-template-rows:repeat(7,12px);
gap:4px;
}

.day{
width:12px;
height:12px;
border-radius:2px;
background:#ebedf0;
position:relative;
}

.dark .day{background:#2d333b;}

.level1{background:#9be9a8}
.level2{background:#40c463}
.level3{background:#30a14e}
.level4{background:#216e39}

/* tooltip */

.day:hover::after{
content:attr(data-date);
position:absolute;
bottom:18px;
left:-20px;
background:#000;
color:#fff;
font-size:10px;
padding:3px 6px;
border-radius:4px;
white-space:nowrap;
}

canvas{
margin-top:25px;
max-width:100%;
}

</style>

</head>

<body>

<h1>📅 Routine Tracker</h1>

<button onclick="toggleDark()">🌙 Dark Mode</button>

<div class="container">

<h3>Date</h3>

<button class="nav" onclick="prevDay()">⬅</button>
<input type="date" id="datePicker">
<button class="nav" onclick="nextDay()">➡</button>

<h3>Activities</h3>

<label><input type="checkbox" class="task"> Running</label>
<label><input type="checkbox" class="task"> Gym</label>
<label><input type="checkbox" class="task"> 8000 Steps</label>
<label><input type="checkbox" class="task"> Drink Water</label>
<label><input type="checkbox" class="task"> Healthy Diet</label>
<label><input type="checkbox" class="task"> Meditation</label>
<label><input type="checkbox" class="task"> Sleep 7h</label>

<label><input type="checkbox" id="restDay"> Rest Day</label>

<h3>Weight</h3>
<input type="number" id="weight" placeholder="kg">

<div class="score" id="dailyScore">Daily Score: 0%</div>
<div class="score" id="weeklyScore">Weekly Avg: 0%</div>
<div class="score" id="streak">Streak: 0 days</div>

<button class="save" onclick="saveDay()">Save</button>
<button class="reset" onclick="resetDay()">Reset</button>

<h3>Progress Dashboard</h3>

<div class="dashboard">
Total Days: <span id="totalDays">0</span><br>
Best Streak: <span id="bestStreak">0</span><br>
Average Completion: <span id="avgCompletion">0%</span>
</div>

<h3>AI Insights</h3>
<div id="aiInsights"></div>

<h3>Year Activity</h3>

<div class="heatmap-wrapper">
<div class="heatmap" id="heatmap"></div>
</div>

<h3>Weight Progress</h3>
<canvas id="weightChart" width="420" height="200"></canvas>

<h3>Habit Completion</h3>
<canvas id="habitChart" width="420" height="200"></canvas>

</div>

<script>

const datePicker=document.getElementById("datePicker");
const tasks=document.querySelectorAll(".task");
const restBox=document.getElementById("restDay");
const weightInput=document.getElementById("weight");

datePicker.valueAsDate=new Date();

function key(date){return "tracker-"+date;}

function prevDay(){
let d=new Date(datePicker.value);
d.setDate(d.getDate()-1);
datePicker.valueAsDate=d;
loadDay();
}

function nextDay(){
let d=new Date(datePicker.value);
d.setDate(d.getDate()+1);
datePicker.valueAsDate=d;
loadDay();
}

/* SCORE */

function dailyScore(){

if(restBox.checked) return 100;

let done=0;
tasks.forEach(t=>{if(t.checked) done++;});

return Math.round(done/tasks.length*100);

}

function updateScore(){

document.getElementById("dailyScore").innerText=
"Daily Score: "+dailyScore()+"%";

}

tasks.forEach(t=>t.addEventListener("change",updateScore));
restBox.addEventListener("change",updateScore);

/* SAVE */

function saveDay(){

let date=datePicker.value;

let data={
tasks:[],
rest:restBox.checked,
weight:weightInput.value
};

tasks.forEach(t=>data.tasks.push(t.checked));

localStorage.setItem(key(date),JSON.stringify(data));

updateScore();
weeklyAvg();
drawHeatmap();
drawWeightChart();
drawHabitChart();
calcStreak();
updateDashboard();
aiInsights();

}

/* LOAD */

function loadDay(){

let saved=JSON.parse(localStorage.getItem(key(datePicker.value)));

if(saved){

tasks.forEach((t,i)=>t.checked=saved.tasks[i]);
restBox.checked=saved.rest;
weightInput.value=saved.weight||"";

}else{

tasks.forEach(t=>t.checked=false);
restBox.checked=false;
weightInput.value="";

}

updateScore();
weeklyAvg();
calcStreak();

}

/* WEEKLY */

function weeklyAvg(){

let total=0,days=0;

for(let i=0;i<7;i++){

let d=new Date();
d.setDate(d.getDate()-i);

let saved=JSON.parse(localStorage.getItem(key(d.toISOString().slice(0,10))));

if(saved){

days++;

let c=saved.tasks.filter(x=>x).length;
total+=Math.round(c/tasks.length*100);

}

}

let avg=days?Math.round(total/days):0;

document.getElementById("weeklyScore").innerText="Weekly Avg: "+avg+"%";

}

/* STREAK */

function calcStreak(){

let streak=0;

for(let i=0;i<365;i++){

let d=new Date();
d.setDate(d.getDate()-i);

let saved=JSON.parse(localStorage.getItem(key(d.toISOString().slice(0,10))));
if(!saved) break;

let c=saved.tasks.filter(x=>x).length;
let score=Math.round(c/tasks.length*100);

if(score>=80) streak++;
else break;

}

document.getElementById("streak").innerText="Streak: "+streak+" days";

}

/* TRUE GITHUB HEATMAP */

function drawHeatmap(){

const map=document.getElementById("heatmap");
map.innerHTML="";

let today=new Date();
let start=new Date();
start.setDate(today.getDate()-364);

for(let i=0;i<365;i++){

let d=new Date(start);
d.setDate(start.getDate()+i);

let saved=JSON.parse(localStorage.getItem(key(d.toISOString().slice(0,10))));

let score=0;

if(saved){
score=Math.round(saved.tasks.filter(x=>x).length/tasks.length*100);
}

let div=document.createElement("div");

div.className="day";
div.dataset.date=d.toISOString().slice(0,10);

let week=Math.floor(i/7);
let weekday=d.getDay();

div.style.gridColumn=week+1;
div.style.gridRow=weekday+1;

if(score>0 && score<40) div.classList.add("level1");
if(score>=40 && score<70) div.classList.add("level2");
if(score>=70 && score<90) div.classList.add("level3");
if(score>=90) div.classList.add("level4");

map.appendChild(div);

}

}

/* DARK MODE */

function toggleDark(){

document.body.classList.toggle("dark");

localStorage.setItem("darkMode",
document.body.classList.contains("dark"));

}

if(localStorage.getItem("darkMode")=="true"){
document.body.classList.add("dark");
}

datePicker.addEventListener("change",loadDay);

drawHeatmap();
loadDay();

</script>

</body>
</html>
